name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          gh api "repos/$REPO/releases" --jq ".[] | select(.tag_name == \"$TAG\" and .draft) | .id" | while read -r id; do
            gh api "repos/$REPO/releases/$id" --method DELETE
          done
          gh release create "$TAG" --repo "$REPO" --draft --title "Awake $TAG" --notes "Download for your platform below."

  build:
    needs: create-release
    if: ${{ always() && !failure() && !cancelled() }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS
            target: aarch64-apple-darwin
            asset: awake-macos-arm64.zip
          - os: windows-latest
            label: Windows
            target: x86_64-pc-windows-msvc
            asset: awake-windows-x86_64.zip
          - os: ubuntu-22.04
            label: Linux
            target: x86_64-unknown-linux-gnu
            asset: awake-linux-x86_64.tar.gz

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.label }})

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Sign macOS binary
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Import certificate into a temporary keychain
          KEYCHAIN="build.keychain"
          KEYCHAIN_PASSWORD="actions"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          echo "$APPLE_CERTIFICATE" | base64 --decode > cert.p12
          security import cert.p12 -k "$KEYCHAIN" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          rm cert.p12

          # Bundle the app
          mkdir -p Awake.app/Contents/MacOS
          cp Info.plist Awake.app/Contents/
          cp target/${{ matrix.target }}/release/awake Awake.app/Contents/MacOS/
          strip Awake.app/Contents/MacOS/awake

          # Sign the app bundle
          codesign --force --options runtime --sign "$APPLE_SIGNING_IDENTITY" --timestamp Awake.app/Contents/MacOS/awake
          codesign --force --options runtime --sign "$APPLE_SIGNING_IDENTITY" --timestamp Awake.app

          # Create zip for notarization
          ditto -c -k --keepParent Awake.app ${{ matrix.asset }}

          # Notarize
          xcrun notarytool submit ${{ matrix.asset }} \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          # Staple the app and re-zip
          xcrun stapler staple Awake.app
          rm ${{ matrix.asset }}
          ditto -c -k --keepParent Awake.app ${{ matrix.asset }}

          # Cleanup keychain
          security delete-keychain "$KEYCHAIN"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path target/${{ matrix.target }}/release/awake.exe -DestinationPath ${{ matrix.asset }}

      - name: Sign Windows binary
        if: runner.os == 'Windows'
        uses: azure/trusted-signing-action@v0.5.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: https://plc.codesigning.azure.net/
          trusted-signing-account-name: shoulders
          certificate-profile-name: mim-1
          files-folder: target/${{ matrix.target }}/release
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Re-package signed Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Remove-Item ${{ matrix.asset }}
          Compress-Archive -Path target/${{ matrix.target }}/release/awake.exe -DestinationPath ${{ matrix.asset }}

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          strip target/${{ matrix.target }}/release/awake
          tar czf ${{ matrix.asset }} -C target/${{ matrix.target }}/release awake

      - name: Upload artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: gh release upload "${{ github.ref_name }}" "${{ matrix.asset }}" --repo "${{ github.repository }}" --clobber

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ github.ref_name }}" --repo "${{ github.repository }}" --draft=false
